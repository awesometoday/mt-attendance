<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>好森 · 出席查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-deep: #1e3d2a;
  --green-mid:  #2d5a3d;
  --green-soft: #4a7c5f;
  --green-pale: #e8f2ec;
  --green-mist: #f3f8f5;
  --amber:      #c47c2b;
  --amber-pale: #fdf3e4;
  --red:        #b53a3a;
  --red-pale:   #fdeaea;
  --blue:       #3949ab;
  --blue-pale:  #e8eaf6;
  --purple:     #6a1b9a;
  --purple-pale:#ede7f6;
  --ink:        #1a2820;
  --muted:      #6b8070;
  --border:     #d4e4db;
  --white:      #fdfffe;
  --radius:     14px;
  --shadow:     0 4px 24px rgba(30,61,42,.10);
}

html, body {
  min-height: 100vh;
  background: var(--green-mist);
  font-family: 'Noto Serif TC', serif;
  color: var(--ink);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(74,124,95,.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 90% 110%, rgba(30,61,42,.09) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 28px 16px 60px;
}

/* ── site header ── */
.site-header { text-align: center; margin-bottom: 28px; }
.site-logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.logo-leaf {
  width: 38px; height: 38px;
  background: var(--green-mid);
  border-radius: 50% 50% 50% 10%;
  transform: rotate(-20deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
}
.logo-text { font-size: 24px; font-weight: 700; color: var(--green-deep); letter-spacing: .05em; }
.site-sub { font-size: 12px; color: var(--muted); letter-spacing: .06em; }

/* ── search card ── */
.search-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 24px 20px 20px;
  margin-bottom: 18px;
}
.search-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
.field-group { margin-bottom: 12px; }
.field-group input,
.field-group select {
  width: 100%; padding: 11px 14px;
  font-size: 15px; font-family: 'Noto Serif TC', serif;
  border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--green-mist); color: var(--ink);
  outline: none; transition: border-color .2s; -webkit-appearance: none;
}
.field-group input:focus, .field-group select:focus {
  border-color: var(--green-soft); background: var(--white);
}
.field-group input::placeholder { color: var(--muted); font-size: 13px; }
.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾'; position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 13px;
}
.search-btn {
  width: 100%; padding: 13px;
  background: var(--green-mid); color: var(--white);
  font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 600;
  border: none; border-radius: 10px; cursor: pointer;
  letter-spacing: .06em; transition: background .2s, transform .1s;
  position: relative; overflow: hidden;
}
.search-btn:hover { background: var(--green-deep); }
.search-btn:active { transform: scale(.98); }
.search-btn:disabled { background: var(--green-pale); color: var(--muted); cursor: default; }
.search-btn .sp {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4); border-top-color: white;
  border-radius: 50%; animation: spin .7s linear infinite;
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
}
.search-btn.loading .sp { display: block; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

/* ── messages ── */
.msg { text-align: center; padding: 14px; font-size: 13px; color: var(--muted); animation: fadeIn .3s ease; }
.msg.error { background: var(--red-pale); color: var(--red); border-radius: 10px; border: 1px solid rgba(181,58,58,.2); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

/* ── profile card ── */
.profile-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp .3s ease;
}

/* hero */
.profile-hero {
  background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
  padding: 20px 18px;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.profile-hero::after {
  content: '🌿'; position: absolute; right: -6px; bottom: -10px;
  font-size: 56px; opacity: .12; transform: rotate(20deg);
}
.profile-emoji-wrap {
  width: 56px; height: 56px;
  background: rgba(255,255,255,.15);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 28px; flex-shrink: 0;
}
.profile-name { font-size: 20px; font-weight: 700; color: white; margin-bottom: 3px; }
.profile-class { font-size: 12px; color: rgba(255,255,255,.75); letter-spacing: .04em; }

/* stats */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}
.stat { padding: 13px 4px; text-align: center; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-val { font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: .02em; }
.v-present { color: var(--green-mid); }
.v-leave   { color: var(--amber); }
.v-absent  { color: var(--red); }
.v-pending { color: #e67e22; }
.v-remain  { color: var(--green-deep); }
.v-warn    { color: var(--amber); }
.v-danger  { color: var(--red); }

/* sections */
.section {
  border-bottom: 1px solid var(--border);
  padding: 16px 18px;
}
.section:last-child { border-bottom: none; }
.section-title {
  font-size: 13px; font-weight: 600; color: var(--ink);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}

/* prev makeup section */
.makeup-meta {
  font-size: 12px; color: var(--muted);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.makeup-meta .deadline-chip {
  background: var(--amber-pale); color: var(--amber);
  padding: 2px 9px; border-radius: 20px; font-size: 11px;
}
.makeup-meta .owed-chip {
  background: var(--red-pale); color: var(--red);
  padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.makeup-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.makeup-slot {
  text-align: center; min-width: 54px;
}
.slot-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.slot-date {
  font-size: 13px; font-weight: 500;
  padding: 5px 8px; border-radius: 7px;
  background: var(--purple-pale); color: var(--purple);
  font-family: 'DM Mono', monospace;
}
.slot-date.empty { background: #f5f5f5; color: #bbb; font-size: 11px; }

/* formula */
.formula {
  background: #f8faf9; border-radius: 8px;
  padding: 10px 13px; margin-bottom: 12px;
  font-size: 12px; color: var(--muted); line-height: 1.9;
}
.formula span { color: var(--ink); font-weight: 600; }

/* timeline */
.tl-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid #f0f5f2;
  font-size: 13px; animation: fadeIn .2s ease both;
}
.tl-row:last-child { border-bottom: none; }
.tl-row.is-future { opacity: .45; }
.tl-week { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 26px; flex-shrink: 0; }
.tl-date { color: var(--muted); font-size: 13px; flex: 1; }
.badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 20px; letter-spacing: .02em; white-space: nowrap;
}
.b-present  { background: #e8f5e9; color: #2d5a3d; }
.b-leave    { background: var(--amber-pale); color: var(--amber); }
.b-absent   { background: var(--red-pale); color: var(--red); }
.b-makeup   { background: var(--blue-pale); color: var(--blue); }
.b-prev     { background: var(--purple-pale); color: var(--purple); }
.b-none     { background: #f5f5f5; color: #bbb; }
.b-future   { background: transparent; color: #ccc; }

/* notes */
.notes-list { display: flex; flex-direction: column; gap: 4px; }
.note-row { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f0f5f2; }
.note-row:last-child { border-bottom: none; }
.note-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); width: 44px; flex-shrink: 0; }
.note-text { color: var(--ink); }

/* footer */
.footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--muted); opacity: .7; }
</style>
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <div class="site-logo">
      <div class="logo-leaf">🌿</div>
      <span class="logo-text">好森</span>
    </div>
    <div class="site-sub">Music Together 春季 2026 · 出席查詢</div>
  </header>

  <div class="search-card">
    <div class="search-label">查詢我的出席紀錄</div>
    <div class="field-group">
      <input type="text" id="nicknameInput" placeholder="請輸入孩子的上課小名（例：森森）"
        autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text">
    </div>
    <div class="field-group">
      <div class="select-wrap">
        <select id="classSelect"><option value="">載入中…</option></select>
      </div>
    </div>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">
      查詢<span class="sp"></span>
    </button>
  </div>

  <div id="result"></div>

  <div class="footer">資料每次查詢即時同步 · 僅供查閱，無法修改</div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwTl_pEaFQb-0UuATusXi_utWNAcR4cRE8Hu-WMUv-59PQxJXTXPIXvZsCOEzT_SQE/exec';
let classesData = [];
let allAttendance = {};

async function apiGet(params) {
  const res = await fetch(API + '?' + new URLSearchParams(params));
  return res.json();
}

async function loadClasses() {
  try {
    const data = await apiGet({ action: 'getClasses' });
    classesData = Array.isArray(data) ? data : (data.classes || data.data || []);
    const sel = document.getElementById('classSelect');
    if (!classesData.length) { sel.innerHTML = '<option value="">（無班級資料）</option>'; return; }
    sel.innerHTML = '<option value="">請選擇上課時段</option>' +
      classesData.map(c => `<option value="${esc(c.name)}">${c.name}</option>`).join('');
  } catch(e) {
    document.getElementById('classSelect').innerHTML = '<option value="">無法載入班級（請刷新）</option>';
  }
}

async function doSearch() {
  const name   = document.getElementById('nicknameInput').value.trim();
  const cls    = document.getElementById('classSelect').value;
  const btn    = document.getElementById('searchBtn');
  const result = document.getElementById('result');
  if (!name) { showMsg('請輸入學生暱稱', 'error'); return; }
  if (!cls)  { showMsg('請選擇上課時段', 'error'); return; }
  btn.disabled = true; btn.classList.add('loading');
  btn.childNodes[0].textContent = '查詢中…';
  result.innerHTML = '';
  try {
    // Fetch all students (full data) + all attendance in parallel
    const [stuData, attData] = await Promise.all([
      apiGet({ action: 'getStudents' }),   // 不加 class filter，確保欄位完整
      apiGet({ action: 'getAllAttendance' })
    ]);
    const students = Array.isArray(stuData) ? stuData : (stuData.students || stuData.data || []);
    // Match by name AND class
    const student = students.find(s =>
      (s.name || '').trim().toLowerCase() === name.toLowerCase() &&
      (s.class || '').trim() === cls.trim()
    );
    if (!student) {
      showMsg(`找不到「${name}」在 ${cls} 的紀錄，請確認暱稱和時段是否正確`, 'error');
      return;
    }
    // Build attendance map keyed by studentId AND name:class (fallback)
    const attRows = Array.isArray(attData) ? attData : (attData.records || attData.data || []);
    allAttendance = {};
    attRows.forEach(r => {
      const d = normDate(r.date);
      if (!d) return;
      const status = (r.status || '').trim();
      // Index by studentId
      if (r.studentId) {
        if (!allAttendance[r.studentId]) allAttendance[r.studentId] = {};
        allAttendance[r.studentId][d] = status;
      }
      // Index by normalized name as fallback
      if (r.name) {
        const nk = 'name::' + String(r.name).trim().toLowerCase();
        if (!allAttendance[nk]) allAttendance[nk] = {};
        allAttendance[nk][d] = status;
      }
    });
    const classObj = classesData.find(c => c.name === cls);
    const dates    = (classObj ? (classObj.dates || []) : []).map(normDate).filter(Boolean);
    renderProfile(student, dates);
  } catch(e) {
    showMsg('查詢失敗，請稍後再試', 'error');
    console.error(e);
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
    btn.childNodes[0].textContent = '查詢';
  }
}

function renderProfile(s, dates) {
  const sid    = s.id || s.studentId;
  const nameKey = 'name::' + String(s.name).trim().toLowerCase();
  // Merge both sources: ID-based + name-based, so partial matches don't block the other
  const att = Object.assign({}, allAttendance[sid] || {}, allAttendance[nameKey] || {});
  const today  = todayStr();
  const total  = Number(s.totalSessions) || 0;
  const prevMkp = Number(s.prevMakeup) || 0;
  const prevDeadline = normDate(s.prevMakeupDeadline);
  const thisDeadline = normDate(s.makeupDeadline);

  // ── calc stats (aligned with admin logic) ──
  let present = 0, leave = 0, absent = 0, mkpPrev = 0;
  dates.forEach(d => {
    if (d > today) return;
    const st = att[d];
    if      (st === 'present')    present++;
    else if (st === 'absent')     leave++;
    else if (st === 'truant')     absent++;
    else if (st === 'prevmakeup') mkpPrev++;
  });
  // 本季補課：掃所有日期的 makeup 記錄（不限於課表日期，補課通常在非課表日）
  const mkpThis = Object.keys(att).filter(d => att[d] === 'makeup').length;
  const totalSessions = total + prevMkp;
  const usedAll = present + absent + mkpPrev + mkpThis;
  const remain  = totalSessions - usedAll;
  const displayPresent = present + mkpPrev + mkpThis;
  const pendingLeave  = Math.max(0, leave - mkpThis);
  const prevOwed      = Math.max(0, prevMkp - mkpPrev);
  const pendingTotal  = prevOwed + pendingLeave;

  const rcCls = remain <= 0 ? 'v-danger' : remain <= 2 ? 'v-warn' : 'v-remain';
  const pkCls = pendingTotal > 0 ? 'v-pending' : 'v-present';

  // ── prev makeup slots ──
  let prevSlots = [];
  if (s.makeupSlots) {
    prevSlots = Array.isArray(s.makeupSlots)
      ? s.makeupSlots
      : String(s.makeupSlots).split('|').filter(Boolean);
  }

  // ── this-season makeup dates from attendance ──
  const thisMkpDates = dates.filter(d => att[d] === 'makeup');

  // ── prev makeup section HTML ──
  let prevSectionHTML = '';
  if (prevMkp > 0) {
    const MAX_SLOTS = Math.max(prevMkp, prevSlots.length, 1);
    const slotsHTML = Array.from({ length: MAX_SLOTS }, (_, i) => {
      const d = prevSlots[i];
      const raw = d ? shortDate(d) : '';
      const display = raw || '日期';
      const cls2 = raw ? '' : 'empty';
      return `<div class="makeup-slot">
        <div class="slot-label">補${i + 1}</div>
        <div class="slot-date ${cls2}">${display}</div>
      </div>`;
    }).join('');

    prevSectionHTML = `
      <div class="section">
        <div class="section-title">📌 上季補課記錄</div>
        <div class="makeup-meta">
          ${prevDeadline ? `<span class="deadline-chip">補課期限 ${prevDeadline}</span>` : ''}
          <span class="owed-chip">上季欠補：${prevMkp} 堂</span>
        </div>
        <div class="makeup-grid">${slotsHTML}</div>
      </div>`;
  }

  // ── this-season makeup section HTML ──
  const MAX_THIS = Math.max(leave, thisMkpDates.length, 1);
  const thisSlotsHTML = Array.from({ length: MAX_THIS }, (_, i) => {
    const d = thisMkpDates[i];
    const raw = d ? shortDate(d) : '';
    const display = raw || '日期';
    const cls2 = raw ? '' : 'empty';
    return `<div class="makeup-slot">
      <div class="slot-label">補${i + 1}</div>
      <div class="slot-date ${cls2}">${display}</div>
    </div>`;
  }).join('');

  // ── timeline HTML ──
  const STATUS_MAP = {
    present:    ['出席',    'b-present'],
    absent:     ['請假',    'b-leave'],
    truant:     ['缺課',    'b-absent'],
    makeup:     ['本季補課', 'b-makeup'],
    prevmakeup: ['上季補課', 'b-prev'],
    none:       ['未登記',  'b-none'],
  };
  const tlHTML = dates.map((d, i) => {
    const isFuture = d > today;
    const st = att[d];
    let badge, badgeCls;
    if (isFuture)           { badge = '—';    badgeCls = 'b-future'; }
    else if (!st || st === 'none') { badge = '未登記'; badgeCls = 'b-none'; }
    else { [badge, badgeCls] = STATUS_MAP[st] || [st, 'b-none']; }
    return `
      <div class="tl-row${isFuture ? ' is-future' : ''}" style="animation-delay:${i * 25}ms">
        <span class="tl-week">W${i + 1}</span>
        <span class="tl-date">${formatDate(d)}</span>
        <span class="badge ${badgeCls}">${badge}</span>
      </div>`;
  }).join('');

  // ── notes section ──
  const notesList = dates
    .filter(d => {
      const st = att[d];
      return st && st !== 'present' && st !== 'none' && d <= today;
    })
    .map(d => {
      const st = att[d];
      const label = {absent:'請假', truant:'缺課', makeup:'本季補課', prevmakeup:'上季補課'}[st] || st;
      return `<div class="note-row"><span class="note-date">${shortDate(d)}</span><span class="note-text">${label}</span></div>`;
    });
  // Also include stored notes from student record
  const storedNotes = (s.notes || s.memo || '').trim();
  const notesHTML = (notesList.length || storedNotes)
    ? `<div class="section"><div class="section-title">📝 備註</div>
        ${storedNotes ? `<div style="font-size:13px;color:var(--ink);margin-bottom:${notesList.length?'10px':'0'};white-space:pre-line">${esc(storedNotes)}</div>` : ''}
        <div class="notes-list">${notesList.join('')}</div>
      </div>`
    : '';

  document.getElementById('result').innerHTML = `
    <div class="profile-card">

      <div class="profile-hero">
        <div class="profile-emoji-wrap">${isEmoji(s.emoji) ? s.emoji : '🎵'}</div>
        <div>
          <div class="profile-name">${esc(s.name)}</div>
          <div class="profile-class">${esc(s.class)}</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat"><div class="stat-val v-present">${displayPresent}</div><div class="stat-lbl">出席</div></div>
        <div class="stat"><div class="stat-val v-leave">${leave}</div><div class="stat-lbl">請假</div></div>
        <div class="stat"><div class="stat-val v-absent">${absent}</div><div class="stat-lbl">缺課</div></div>
        <div class="stat"><div class="stat-val ${rcCls}">${remain}</div><div class="stat-lbl">剩餘堂數</div></div>
      </div>

      ${prevSectionHTML}

      <div class="section">
        <div class="section-title">📋 本季補課記錄</div>
        <div class="makeup-grid">
          ${leave > 0 ? thisSlotsHTML : '<span style="font-size:13px;color:var(--muted)">本季尚無需補課記錄</span>'}
        </div>
      </div>

      <div class="section">
        <div class="section-title">📅 本季出席記錄</div>
        <div class="formula">
          剩餘堂數 = （購買 <span>${total}</span> + 上季補課 <span>${prevMkp}</span>）
            − 出席 <span>${displayPresent}</span> 次（含補課）
            − 缺課 <span>${absent}</span> 次
            = <span>${remain}</span> 堂<br>

        </div>
        ${tlHTML || '<div class="msg">尚無紀錄</div>'}
      </div>

      ${notesHTML}

    </div>`;
}

function showMsg(t, type='') {
  // ── notes section ──
  const notesList = dates
    .filter(d => {
      const st = att[d];
      return st && st !== 'present' && st !== 'none' && d <= today;
    })
    .map(d => {
      const st = att[d];
      const label = {absent:'請假', truant:'缺課', makeup:'本季補課', prevmakeup:'上季補課'}[st] || st;
      return `<div class="note-row"><span class="note-date">${shortDate(d)}</span><span class="note-text">${label}</span></div>`;
    });
  // Also include stored notes from student record
  const storedNotes = (s.notes || s.memo || '').trim();
  const notesHTML = (notesList.length || storedNotes)
    ? `<div class="section"><div class="section-title">📝 備註</div>
        ${storedNotes ? `<div style="font-size:13px;color:var(--ink);margin-bottom:${notesList.length?'10px':'0'};white-space:pre-line">${esc(storedNotes)}</div>` : ''}
        <div class="notes-list">${notesList.join('')}</div>
      </div>`
    : '';

  document.getElementById('result').innerHTML = `<div class="msg ${type}">${t}</div>`;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(s) {
  if (!s) return '';
  const p = s.split('/');
  if (p.length < 3) return s;
  const days = ['日','一','二','三','四','五','六'];
  return `${p[1]}/${p[2]}（${days[new Date(p[0], p[1]-1, p[2]).getDay()]}）`;
}

function shortDate(s) {
  if (!s) return '';
  const str = String(s).trim();
  if (!str || str === 'NA') return str;
  const normalized = normDate(str);
  if (!/^\d{4}\/\d{2}\/\d{2}$/.test(normalized)) return '';
  const p = normalized.split('/');
  return `${+p[1]}/${+p[2]}`;
}

function normDate(d) {
  if (!d) return '';
  // Handle Date objects serialized as strings like "Wed Feb 26 2026 00:00:00 GMT+0800"
  const s = String(d).trim();
  // Already in YYYY/MM/DD format
  if (/^\d{4}\/\d{2}\/\d{2}$/.test(s)) return s;
  // Try parsing as a date and reformatting
  const parsed = new Date(s);
  if (!isNaN(parsed.getTime())) {
    const y = parsed.getFullYear();
    const m = String(parsed.getMonth() + 1).padStart(2, '0');
    const day = String(parsed.getDate()).padStart(2, '0');
    return `${y}/${m}/${day}`;
  }
  return s;
}

function isEmoji(s) {
  if (!s || s.length > 8) return false;
  return /\p{Emoji_Presentation}/u.test(s);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('DOMContentLoaded', () => {
  loadClasses();
  document.getElementById('nicknameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
});
</script>
